<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Datastat - Frontend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">DataStat API</h1>

      <section class="card mb-4 p-3">
        <h5>Calcular Estatísticas</h5>
        <textarea id="nums" class="form-control mb-2" rows="3" placeholder="Digite números separados por vírgula ou espaço"></textarea>
        <button id="calcBtn" class="btn btn-primary">Calcular</button>
        <div id="calcResult" class="mt-3 bg-white p-3 border rounded"></div>
      </section>

      <section class="card mb-4 p-3">
        <h5>Histograma</h5>
        <textarea id="histNums" class="form-control mb-2" rows="2" placeholder="Números separados por vírgula ou espaço"></textarea>
        <input id="bins" class="form-control mb-2" type="number" placeholder="Bins (ex: 5)" />
        <button id="histBtn" class="btn btn-secondary">Gerar Histograma</button>
        <div id="histResult" class="mt-3 bg-white p-3 border rounded"></div>
      </section>

      <section class="card mb-4 p-3">
        <h5>Comparar Dois Conjuntos</h5>
        <div class="row">
          <div class="col">
            <textarea id="nums1" class="form-control" rows="2" placeholder="Números 1"></textarea>
          </div>
          <div class="col">
            <textarea id="nums2" class="form-control" rows="2" placeholder="Números 2"></textarea>
          </div>
        </div>
        <button id="cmpBtn" class="btn btn-success mt-2">Comparar</button>
        <div id="cmpResult" class="mt-3 bg-white p-3 border rounded"></div>
      </section>

      <section class="card mb-4 p-3">
        <h5>Histórico de Operações</h5>
        <button id="loadHistBtn" class="btn btn-info">Carregar Histórico</button>
        <button id="clearHistBtn" class="btn btn-danger">Limpar</button>
        <div id="historyResult" class="mt-3 bg-white p-3 border rounded"></div>
      </section>

      <footer class="text-muted small mt-4">Feito por João Pedro Orem de Moura</footer>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
